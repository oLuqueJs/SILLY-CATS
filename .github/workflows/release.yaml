name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - 'docs/**'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create semantic release
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release@25

      - name: Read generated version
        id: version
        shell: bash
        run: |
          tag="$(git describe --tags --exact-match --match 'v[0-9]*' HEAD 2>/dev/null || true)"
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish container images
    needs:
      - release
    
    if: needs.release.outputs.version != ''

    runs-on: ubuntu-24.04
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/oluquejs/silly-cats:${{ needs.release.outputs.version }}
            ghcr.io/oluquejs/silly-cats:latest

  update-gitops:
    name: Update GitOps image reference 
    needs:
      - release
      - publish

    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          repository: oLuqueJs/SILLY-CATS-GITOPS
          ref: main
          token: {{ secrets.GITOPS_TOKEN }}
          path: gitops
      
      - name: Update image tag and digest
        working-directory: gitops
        env:
          VERSION: ${{ needs.release.outputs.version }}
          DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          test -n "$VERSION"
          test -n "$DIGEST"

          sed -i -E \
            "s|^appVersion: \".*\"|appVersion: \"${VERSION}\"|" \
            charts/silly-cats/Chart.yaml

          sed -i -E \
            "s|^  tag: \".*\"|  tag: \"${VERSION}\"|" \
            charts/silly-cats/values.yaml

          sed -i -E \
            "s|^  digest: \".*\"|  digest: \"${DIGEST}\"|" \
            charts/silly-cats/values-dev.yaml \
            charts/silly-cats/values-prod.yaml

      - name: Validate GitOps changes
        working-directory: gitops
        run: |
          git diff --check

          helm lint charts/silly-cats \
            -f charts/silly-cats/values-dev.yaml

          helm lint charts/silly-cats \
            -f charts/silly-cats/values-prod.yaml

      - name: Create GitOps pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops
          base: main
          branch: chore/silly-cats-${{ needs.release.outputs.version }}
          delete-branch: true
          commit-message: "chore(silly-cats): update image to ${{ needs.release.outputs.version }}"
          title: "chore(silly-cats): update image to ${{ needs.release.outputs.version }}"
          body: |
            Automatic update of the Silly Cats image version.

            - Tag: `${{ needs.release.outputs.version }}`
            - Digest: `${{ needs.publish.outputs.digest }}`
          
          add-paths: |
            charts/silly-cats/Chart.yaml
            charts/silly-cats/values.yaml
            charts/silly-cats/values-dev.yaml
            charts/silly-cats/values-prod.yaml