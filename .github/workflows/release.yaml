name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create semantic release
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write
      packages: write
      pull-requests: write
    
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release@25

      - name: Read generated version
        id: version
        shell: bash
        run: |
          tag="$(git describe --tags --exact-match --match 'v[0-9]*' HEAD 2>/dev/null || true)"
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"