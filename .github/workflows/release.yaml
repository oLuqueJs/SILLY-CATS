name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - README.md

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create semantic release
    runs-on: ubuntu-24.04
    
    permissions:
      contents: write
      packages: write
      pull-requests: write
    
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release@25

      - name: Read generated version
        id: version
        shell: bash
        run: |
          tag="$(git describe --tags --exact-match --match 'v[0-9]*' HEAD 2>/dev/null || true)"
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish container images
    needs:
      - release
    
    if: needs.release.outputs.version != ''

    runs-on: ubuntu-24.04
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/oluquejs/silly-cats-:${{ needs.release.outputs.version }}
            ghcr.io/oluquejs/silly-cats:latest 